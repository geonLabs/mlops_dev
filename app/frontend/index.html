<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Console</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='1' y='14'>⬆</text></svg>">
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="eyebrow">MinIO Upload Console</div>
        <h1>멀티 업로드 & 실시간 진행률</h1>
        <p>드래그 앤 드롭 또는 파일 선택으로 여러 파일을 동시에 올릴 수 있어요.</p>
      </header>

      <section class="panel">
        <div class="auth-row">
          <div id="authState" class="auth-state">CVAT 로그인이 필요합니다.</div>
          <div class="auth-actions">
            <button id="openLoginBtn" type="button">CVAT 로그인</button>
            <button id="logoutBtn" class="ghost" type="button" hidden>로그아웃</button>
          </div>
        </div>

        <div class="project-row">
          <label for="orgSelect" class="project-label">CVAT 조직</label>
          <div class="project-controls">
            <select id="orgSelect">
              <option value="">개인 워크스페이스</option>
            </select>
          </div>
        </div>

        <div class="project-row">
          <label for="projectSelect" class="project-label">CVAT 프로젝트</label>
          <div class="project-controls">
            <select id="projectSelect">
              <option value="">프로젝트 불러오는 중...</option>
            </select>
            <button id="refreshProjectsBtn" class="ghost" type="button">새로고침</button>
          </div>
          <div id="projectHint" class="muted">프로젝트 목록을 불러오고 있습니다.</div>
        </div>

        <div class="project-row">
          <div class="project-label">Advanced Configuration (ZIP Task)</div>
          <div class="advanced-grid">
            <label class="advanced-field" for="segmentSizeInput">
              <span>Segment Size</span>
              <input id="segmentSizeInput" type="number" min="1" value="100" />
            </label>
            <label class="advanced-field" for="imageQualityInput">
              <span>Image Quality</span>
              <input id="imageQualityInput" type="number" min="1" max="100" value="100" />
            </label>
          </div>
          <div class="taskname-config">
            <div class="taskname-tabs" role="tablist" aria-label="Task Name Mode">
              <button id="taskNameAutoTab" type="button" class="taskname-tab active" role="tab" aria-selected="true">
                현재 날짜/시간
              </button>
              <button id="taskNameCustomTab" type="button" class="taskname-tab" role="tab" aria-selected="false">
                직접 입력
              </button>
            </div>
            <div id="taskNameAutoPanel" class="taskname-panel">
              <span class="muted">생성될 Task 이름:</span>
              <code id="taskNamePreview"></code>
            </div>
            <div id="taskNameCustomPanel" class="taskname-panel hidden">
              <label class="advanced-field" for="taskNameCustomInput">
                <span>Task Name</span>
                <input id="taskNameCustomInput" type="text" maxlength="256" placeholder="예: roadfinder_batch_20260303" />
              </label>
            </div>
          </div>
          <div class="muted">ZIP 파일 업로드 시 선택한 프로젝트의 새 Task 생성에 사용됩니다.</div>
        </div>

        <input id="fileInput" type="file" multiple hidden />
        <div id="dropzone" class="drop">
          <div class="drop-content">
            <div class="drop-title">여기로 파일을 끌어다 놓기</div>
            <div class="drop-sub">또는 버튼으로 선택</div>
            <div class="drop-actions">
              <button id="pickBtn" type="button">파일 선택</button>
              <button id="startBtn" type="button" class="accent">확인 후 업로드</button>
            </div>
          </div>
        </div>

        <div class="overview">
          <div class="overview-row">
            <div>
              <div class="overview-title">브라우저 → MinIO (전체)</div>
              <div class="overview-meta"><span id="overallUploadText">0%</span></div>
            </div>
            <progress id="overallUpload" max="100" value="0"></progress>
          </div>
          <div class="overview-row">
            <div>
              <div class="overview-title">완료된 파일</div>
              <div class="overview-meta"><span id="overallMinioText">0%</span></div>
            </div>
            <progress id="overallMinio" class="minio" max="100" value="0"></progress>
          </div>
        </div>

        <div class="toolbar">
          <div id="summary" class="muted">대기중</div>
          <button id="clearBtn" class="ghost" type="button">목록 비우기</button>
        </div>

        <div id="list" class="list"></div>
      </section>
    </div>

    <div id="loginModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="loginTitle">CVAT 로그인</h2>
          <button id="closeLoginBtn" class="icon-btn" type="button" aria-label="닫기">×</button>
        </div>
        <form id="loginForm">
          <div class="field">
            <label for="loginUsername">아이디</label>
            <input id="loginUsername" name="username" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="loginPassword">비밀번호</label>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
          </div>
          <div id="loginError" class="login-error"></div>
          <div class="modal-actions">
            <button id="cancelLoginBtn" class="ghost" type="button">취소</button>
            <button id="submitLoginBtn" class="accent" type="submit">로그인</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
